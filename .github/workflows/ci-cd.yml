name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t tarunkumar2992/iris-mlops:latest .

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      run: |
        docker push tarunkumar2992/iris-mlops:latest

    # 🔥 NEW STEP (Kubernetes Deployment)

    - name: Set kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml

    - name: Deploy to Kubernetes
      run: |
        kubectl --kubeconfig=kubeconfig.yaml apply -f kubernetes.yaml
# trigger deployment again
